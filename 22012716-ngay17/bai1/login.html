<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial;
            background-color: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .login-box{
            width: 350px;
            background: white;
            padding: 30px;

            border-radius: 10px;

            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;

            background-color: #007bff;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <h2>FORM ĐĂNG NHẬP</h2>

        <form action="process_login.php" method="POST">

            <label>Tên đăng nhập</label>
            <input type="text" name="username">

            <label>Mật khẩu</label>
            <input type="password" name="password">

            <button type="submit">
                Đăng nhập
            </button>

        </form>

    </div>

</body>
</html>
